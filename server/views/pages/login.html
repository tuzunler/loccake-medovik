<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <span class="login-icon"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#c9956b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a5 5 0 0 1 5 5c0 .5-.1 1-.2 1.5h2.7a1.5 1.5 0 0 1 0 3h-.3L18 20a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2l-1.2-8.5h-.3a1.5 1.5 0 0 1 0-3h2.7A5 5 0 0 1 7 7a5 5 0 0 1 5-5z"/></svg></span>
      <h1>Loccake Admin</h1>
      <p>Sign in to the control panel</p>
    </div>
    <form method="POST" action="/auth/login" class="login-form">
      [= raw(csrfField)]
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="admin@loccake.com">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required minlength="1" placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary btn-full">Sign In</button>
    </form>
    <div class="login-footer">
      <a href="/">← Back to site</a>
    </div>
  </div>
</div>
