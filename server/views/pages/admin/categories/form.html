<div class="admin-layout">
  [> partials/admin-sidebar]
  <main class="admin-main">
    <div class="admin-header">
      <h1>[# if isEdit]Edit Category[# else]New Category[/if]</h1>
      <a href="/admin/categories" class="btn btn-outline">← Back</a>
    </div>

    <div class="card">
      <form method="POST" action="[# if isEdit]/admin/categories/[= category._id]/edit[# else]/admin/categories/create[/if]" class="admin-form" enctype="multipart/form-data">
        [= raw(csrfField)]

        <div class="form-group">
          <label for="name">Name *</label>
          <input type="text" id="name" name="name" required minlength="2" maxlength="100"
            value="[# if isEdit][= category.name][/if]"
            placeholder="e.g. Cakes">
        </div>

        <div class="form-group">
          <label for="description">Description</label>
          <textarea id="description" name="description" rows="3" maxlength="500"
            placeholder="Brief category description">[# if isEdit][= category.description][/if]</textarea>
        </div>

        <div class="form-group">
          <label for="image">Image</label>
          <input type="file" id="image" name="image" accept="image/jpeg,image/png,image/webp,image/gif,image/svg+xml" class="file-input">
          <small class="form-hint">JPG, PNG, WebP, GIF, SVG — max 5 MB</small>
          [# if isEdit]
            [# if category.image]
              <div class="form-preview">
                <img src="[= category.image]" alt="Preview">
                <span class="preview-label">Current image</span>
              </div>
            [/if]
          [/if]
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="sortOrder">Sort Order</label>
            <input type="number" id="sortOrder" name="sortOrder" min="0"
              value="[# if isEdit][= category.sortOrder][# else]0[/if]">
          </div>

          [# if isEdit]
            <div class="form-group">
              <label for="active">Status</label>
              <select id="active" name="active">
                <option value="true" [# if category.active]selected[/if]>Active</option>
                <option value="false" [# if !category.active]selected[/if]>Hidden</option>
              </select>
            </div>
          [/if]
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">[# if isEdit]Save[# else]Create[/if]</button>
          <a href="/admin/categories" class="btn btn-outline">Cancel</a>
        </div>
      </form>
    </div>
  </main>
</div>
