<div class="admin-layout">
  [> partials/admin-sidebar]
  <main class="admin-main">
    <div class="admin-header">
      <h1>[# if isEdit]Edit Item[# else]New Item[/if]</h1>
      <a href="/admin/items" class="btn btn-outline">← Back</a>
    </div>

    <div class="card">
      <form method="POST" action="[# if isEdit]/admin/items/[= item._id]/edit[# else]/admin/items/create[/if]" class="admin-form" enctype="multipart/form-data">
        [= raw(csrfField)]

        <div class="form-row">
          <div class="form-group form-group-wide">
            <label for="name">Name *</label>
            <input type="text" id="name" name="name" required minlength="2" maxlength="200"
              value="[# if isEdit][= item.name][/if]"
              placeholder="e.g. Classic Honey Cake">
          </div>
          <div class="form-group">
            <label for="price">Price ($) *</label>
            <input type="number" id="price" name="price" required min="0" step="1"
              value="[# if isEdit][= item.price][/if]"
              placeholder="1500">
          </div>
        </div>

        <div class="form-group">
          <label for="categoryId">Category *</label>
          <select id="categoryId" name="categoryId" required>
            <option value="">Select a category</option>
            [# each categories as cat]
              <option value="[= cat._id]" [# if isEdit][# if item.categoryId && item.categoryId._id.toString() === cat._id.toString()]selected[/if][/if]>[= cat.name]</option>
            [/each]
          </select>
        </div>

        <div class="form-group">
          <label for="description">Description</label>
          <textarea id="description" name="description" rows="4" maxlength="2000"
            placeholder="Detailed cake/dessert description">[# if isEdit][= item.description][/if]</textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="weight">Weight</label>
            <input type="text" id="weight" name="weight"
              value="[# if isEdit][= item.weight][/if]"
              placeholder="1.2 kg">
          </div>
          <div class="form-group">
            <label for="calories">Calories</label>
            <input type="number" id="calories" name="calories" min="0"
              value="[# if isEdit][= item.calories][/if]"
              placeholder="350">
          </div>
          <div class="form-group">
            <label for="portions">Portions</label>
            <input type="text" id="portions" name="portions"
              value="[# if isEdit][= item.portions][/if]"
              placeholder="8-10 servings">
          </div>
        </div>

        <div class="form-group">
          <label for="ingredients">Ingredients</label>
          <textarea id="ingredients" name="ingredients" rows="3"
            placeholder="Flour, sugar, honey, sour cream, butter...">[# if isEdit][= item.ingredients][/if]</textarea>
        </div>

        <div class="form-group">
          <label for="image">Image</label>
          <input type="file" id="image" name="image" accept="image/jpeg,image/png,image/webp,image/gif,image/svg+xml" class="file-input">
          <small class="form-hint">JPG, PNG, WebP, GIF, SVG — max 5 MB</small>
          [# if isEdit]
            [# if item.image]
              <div class="form-preview">
                <img src="[= item.image]" alt="Preview">
                <span class="preview-label">Current image</span>
              </div>
            [/if]
          [/if]
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="sortOrder">Sort Order</label>
            <input type="number" id="sortOrder" name="sortOrder" min="0"
              value="[# if isEdit][= item.sortOrder][# else]0[/if]">
          </div>
          [# if isEdit]
            <div class="form-group">
              <label for="active">Status</label>
              <select id="active" name="active">
                <option value="true" [# if item.active]selected[/if]>Active</option>
                <option value="false" [# if !item.active]selected[/if]>Hidden</option>
              </select>
            </div>
          [/if]
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">[# if isEdit]Save[# else]Create[/if]</button>
          <a href="/admin/items" class="btn btn-outline">Cancel</a>
        </div>
      </form>
    </div>
  </main>
</div>
