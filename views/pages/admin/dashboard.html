<div class="admin-layout">
  [> partials/admin-sidebar]
  <main class="admin-main">
    <div class="admin-header">
      <h1>Dashboard</h1>
      <a href="/" class="btn btn-outline" target="_blank" rel="noopener">View site ↗</a>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-number">[= stats.totalCategories]</div>
        <div class="stat-label">Categories</div>
      </div>
      <div class="stat-card">
        <div class="stat-number">[= stats.totalItems]</div>
        <div class="stat-label">Menu Items</div>
      </div>
      <div class="stat-card">
        <div class="stat-number">[= stats.activeItems]</div>
        <div class="stat-label">Active</div>
      </div>
    </div>

    <div class="card">
      <p class="text-muted">Welcome to the Loccake control panel. Use the menu on the left to navigate.</p>
    </div>
  </main>
</div>
